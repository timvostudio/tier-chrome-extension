<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tier</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="panel" id="panel">
    <header class="header">
      <span class="logo">TIER</span>
      <div class="header-actions">
        <button class="icon-btn" id="calendarBtn" title="Connect calendar" aria-label="Connect calendar">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="2.5" width="11" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 5.5H12.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 1.2V3.4M10 1.2V3.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M5.6 9.2L7 7.8L8.4 9.2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 7.8V10.6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="addBtn" title="Add task" aria-label="Add task">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1V13M1 7H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="syncBtn" title="Sync calendar" aria-label="Sync calendar">
          <svg id="syncIcon" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12.5 7A5.5 5.5 0 1 1 10.6 3M12.5 1.5V4.5H9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn a11y-icon-btn" id="a11yBtn" title="Display settings" aria-label="Display settings">
          <span class="a11y-btn-label">Aa</span>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="2.6" r="1.3" fill="currentColor"/><circle cx="7" cy="7" r="1.3" fill="currentColor"/><circle cx="7" cy="11.4" r="1.3" fill="currentColor"/></svg>
        </button>
      </div>
    </header>

    <div class="body" id="body">
      <!-- Rendered dynamically by popup.js -->
    </div>

    <div class="ask-ai-bar" id="askAiBar">
<div class="ask-ai-messages" id="askAiMessages"></div>
      <div class="ask-ai-row">
        <div class="ask-ai-box">
          <div class="ask-ai-icon">?</div>
          <input type="text" class="ask-ai-input" id="askAiInput" placeholder='Type "help" to view services' />
          <button class="ask-ai-send" id="askAiSend" aria-label="Send">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6H11M6 1L11 6L6 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="resize-handle" id="resizeHandle" title="Drag to resize">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <line x1="2.5" y1="10" x2="10" y2="2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="5.5" y1="10" x2="10" y2="5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="8.5" y1="10" x2="10" y2="8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="auth.js"></script>
  <script src="calendar.js"></script>
  <script src="popup.js"></script>
</body>
</html>
